<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Advanced Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#fff;
    color:#202124;
    font-size:13px;
}

/* Navigation */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 35px;
}

.logo img{
    width:92px;
}

nav a{
    text-decoration:none;
    color:#1a73e8;
    font-size:13px;
}

nav a:hover{
    text-decoration:underline;
}

hr{
    border:none;
    border-top:1px solid #ebebeb;
}

/* Main */

.container{
    width:1140px;
    margin:40px auto;
}

h1{
    color:#d93025;
    font-size:20px;
    font-weight:400;
    margin-bottom:40px;
}

/* Heading */

.heading{
    display:grid;
    grid-template-columns:180px 580px 320px;
    gap:16px;
    margin-bottom:20px;
}

.heading span:first-child{
    font-size:16px;
}

.heading span:last-child{
    font-size:13px;
    font-weight:bold;
    color:#777;
}

/* Form */

.row{
    display:grid;
    grid-template-columns:180px 580px 320px;
    gap:16px;
    align-items:center;
    margin-bottom:16px;
}

label{
    font-size:13px;
}

input[type="text"]{
    width:100%;
    height:30px;
    padding:0 8px;
    border:1px solid #d9d9d9;
    font-size:13px;
}

input[type="text"]:focus{
    outline:none;
    border:1px solid #4d90fe;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.15);
}

small{
    font-size:11px;
    color:#555;
    line-height:1.4;
}

small span{
    font-family:monospace;
    color:#666;
}

/* Button */

.button-area{
    width:776px;
    display:flex;
    justify-content:flex-end;
    margin-top:30px;
}

button{
    background:#4d90fe;
    color:#fff;
    border:1px solid #3079ed;
    border-radius:2px;
    padding:8px 14px;
    font-size:11px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#357ae8;
}

/* Responsive */

@media(max-width:1000px){

.container{
    width:95%;
    margin:30px auto;
}

.heading{
    display:block;
}

.heading span:last-child,
small{
    display:none;
}

.row{
    display:block;
}

label{
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
}

.button-area{
    width:100%;
}
}
</style>

</head>
<body>

<header class="navbar">
    <a href="index.html" class="logo">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
    </a>

    <nav>
        <a href="index.html">Google Search</a>
    </nav>
</header>

<hr>

<div class="container">

    <h1>Advanced Search</h1>

    <div class="heading">
        <span>Find pages with...</span>
        <span></span>
        <span>To do this in the search box.</span>
    </div>

    <form action="https://www.google.com/search" method="GET">

        <div class="row">
            <label for="as_q">all these words:</label>

            <input type="text" id="as_q" name="as_q">

            <small>
                Type the important words:
                <span>tri-color rat terrier</span>
            </small>
        </div>

        <div class="row">
            <label for="as_epq">this exact word or phrase:</label>

            <input type="text" id="as_epq" name="as_epq">

            <small>
                Put exact words in quotes:
                <span>"rat terrier"</span>
            </small>
        </div>

        <div class="row">
            <label for="as_oq">any of these words:</label>

            <input type="text" id="as_oq" name="as_oq">

            <small>
                Type OR between all the words:
                <span>miniature OR standard</span>
            </small>
        </div>

        <div class="row">
            <label for="as_eq">none of these words:</label>

            <input type="text" id="as_eq" name="as_eq">

            <small>
                Put a minus sign just before unwanted words:
                <span>-rodent -"Jack Russell"</span>
            </small>
        </div>

        <div class="button-area">
            <button type="submit">Advanced Search</button>
        </div>

    </form>

</div>

</body>
</html>
